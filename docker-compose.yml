version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aperture
      POSTGRES_USER: aperture
      POSTGRES_PASSWORD: aperture
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperture -d aperture"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://aperture:aperture@postgres:5432/aperture
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8001/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env.example
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  reverse-proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./scripts/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
