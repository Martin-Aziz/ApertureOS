name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck common package
        run: pnpm --filter @pixelforge/common typecheck

      - name: Typecheck frontend
        run: pnpm --filter pixelforge-frontend typecheck

      - name: Frontend tests
        run: pnpm --filter pixelforge-frontend test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust format check
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Rust clippy check
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets -- -D warnings

      - name: Backend tests
        run: cargo test --manifest-path backend/Cargo.toml

      - name: WASM tests
        run: cargo test --manifest-path wasm/Cargo.toml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./ai-service[dev]"

      - name: AI service tests
        run: pytest ai-service/tests

      - name: Security audit
        run: pnpm audit --audit-level=moderate
